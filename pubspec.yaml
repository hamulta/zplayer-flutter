name: zplayer_flutter
version: 0.5.1+23
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audio_service: ^0.18.17
  just_audio: ^0.10.0
  on_audio_query: ^2.9.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#08080C"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
