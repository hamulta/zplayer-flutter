name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project files
        run: |
          flutter create --platforms=android --project-name zplayer_offline .
          rm -rf test

      - name: Patch Android permissions
        run: |
          python3 <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          permissions = """    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
          """

          if "READ_MEDIA_AUDIO" not in text:
              text = text.replace("    <application", permissions + "\n    <application", 1)

          manifest.write_text(text)
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Patch on_audio_query Android namespace
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          candidates = list(Path.home().glob(".pub-cache/hosted/pub.dev/on_audio_query_android-*/android/build.gradle"))

          if not candidates:
              raise SystemExit("on_audio_query_android build.gradle not found")

          gradle = candidates[0]
          manifest = gradle.parent / "src" / "main" / "AndroidManifest.xml"

          namespace = "com.lucasjosino.on_audio_query"

          if manifest.exists():
              manifest_text = manifest.read_text()
              found = re.search(r'package="([^"]+)"', manifest_text)
              if found:
                  namespace = found.group(1)

          text = gradle.read_text()

          if "namespace " not in text and "namespace=" not in text:
              text = text.replace(
                  "android {",
                  f"android {{\n    namespace '{namespace}'",
                  1
              )

          gradle.write_text(text)

          print("Patched:", gradle)
          print("Namespace:", namespace)
          PY

      - name: Analyze Dart
        run: |
          rm -rf test
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZPlayer-Offline-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
