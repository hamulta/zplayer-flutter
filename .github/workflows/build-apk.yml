name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project files
        run: |
          flutter create --platforms=android --org com.hamulta --project-name zplayer_flutter .

      - name: Patch Android permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          permissions = '''
          <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
          '''
          if 'READ_MEDIA_AUDIO' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n' + permissions)
          path.write_text(text)
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZPlayer-Offline-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
